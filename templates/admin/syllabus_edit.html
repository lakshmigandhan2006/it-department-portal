{% extends "admin/admin_base.html" %}

{% block header %}Edit Syllabus: {{ syllabus.course_code }}{% endblock %}

{% block content %}
<div class="glass-card p-4 mx-auto" style="max-width: 600px;">
    <h5 class="fw-bold mb-3">Edit Syllabus Details</h5>
    <form action="/admin/syllabus/edit/{{ syllabus.id }}" method="post" class="row g-3">
        <div class="col-md-12">
            <label class="form-label text-secondary fw-semibold">Course Name</label>
            <input type="text" name="course_name" class="form-control" value="{{ syllabus.course_name }}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label text-secondary fw-semibold">Course Code</label>
            <input type="text" name="course_code" class="form-control" value="{{ syllabus.course_code }}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label text-secondary fw-semibold">Semester (1-8)</label>
            <input type="number" name="semester" class="form-control" value="{{ syllabus.semester }}" min="1" max="8" required>
        </div>
        <div class="col-md-12">
            <label class="form-label text-secondary fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="3" required>{{ syllabus.description }}</textarea>
        </div>
        <div class="col-md-12 text-end mt-4">
            <a href="/admin/syllabus" class="btn btn-light px-4 me-2 border">Cancel</a>
            <button type="submit" class="btn btn-gradient px-4"><i class="fa-solid fa-save me-2"></i> Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
