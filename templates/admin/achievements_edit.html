{% extends "admin/admin_base.html" %}

{% block header %}Edit Achievement: {{ achievement.title }}{% endblock %}

{% block content %}
<div class="glass-card p-4 mx-auto" style="max-width: 600px;">
    <h5 class="fw-bold mb-3">Edit Achievement Details</h5>
    <form action="/admin/achievements/edit/{{ achievement.id }}" method="post" class="row g-3">
        <div class="col-md-12">
            <label class="form-label text-secondary fw-semibold">Achievement Title</label>
            <input type="text" name="title" class="form-control" value="{{ achievement.title }}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label text-secondary fw-semibold">Student Name</label>
            <input type="text" name="student_name" class="form-control" value="{{ achievement.student_name }}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label text-secondary fw-semibold">Date</label>
            <input type="date" name="date" class="form-control" value="{{ achievement.date }}" required>
        </div>
        <div class="col-md-12">
            <label class="form-label text-secondary fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="3" required>{{ achievement.description }}</textarea>
        </div>
        <div class="col-md-12 text-end mt-4">
            <a href="/admin/achievements" class="btn btn-light px-4 me-2 border">Cancel</a>
            <button type="submit" class="btn btn-gradient px-4"><i class="fa-solid fa-save me-2"></i> Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
