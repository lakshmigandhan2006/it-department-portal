{% extends "admin/admin_base.html" %}

{% block header %}Edit Student: {{ student.name }}{% endblock %}

{% block content %}
<div class="glass-card p-4">
    <form action="/admin/students/edit/{{ student.id }}" method="post" enctype="multipart/form-data">
        <h5 class="fw-bold mb-4 text-primary border-bottom pb-2">Academic Information</h5>
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Full Name</label>
                <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold">Roll Number</label>
                <input type="text" name="roll_no" class="form-control" value="{{ student.roll_no }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold">UMIS ID</label>
                <input type="text" name="umis_id" class="form-control" value="{{ student.umis_id }}" required>
            </div>
            <div class="col-md-2">
                <label class="form-label text-secondary fw-semibold">Year</label>
                <select name="year" class="form-select form-control">
                    <option value="1st Year" {% if student.year == '1st Year' %}selected{% endif %}>1st Year</option>
                    <option value="2nd Year" {% if student.year == '2nd Year' %}selected{% endif %}>2nd Year</option>
                    <option value="3rd Year" {% if student.year == '3rd Year' %}selected{% endif %}>3rd Year</option>
                    <option value="4th Year" {% if student.year == '4th Year' %}selected{% endif %}>4th Year</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Attendance Percentage</label>
                <div class="input-group">
                    <input type="number" step="0.01" name="attendance_percentage" class="form-control" value="{{ student.attendance_percentage }}">
                    <span class="input-group-text">%</span>
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Last Sem Percentage</label>
                <div class="input-group">
                    <input type="number" step="0.01" name="last_sem_percentage" class="form-control" value="{{ student.last_sem_percentage }}">
                    <span class="input-group-text">%</span>
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Student Photo</label>
                <input type="file" name="photo" class="form-control" accept="image/*">
                {% if student.photo %}
                <div class="mt-2">
                    <img src="/{{ student.photo }}" alt="Current Photo" class="img-thumbnail" style="max-height: 80px;">
                </div>
                {% endif %}
            </div>
        </div>

        <h5 class="fw-bold mb-4 text-primary border-bottom pb-2">Personal Details</h5>
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold">Date of Birth</label>
                <input type="date" name="dob" class="form-control" value="{{ student.dob }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold">Gender</label>
                <select name="gender" class="form-select form-control">
                    <option value="Male" {% if student.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if student.gender == 'Female' %}selected{% endif %}>Female</option>
                    <option value="Other" {% if student.gender == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold">Blood Group</label>
                <input type="text" name="blood_group" class="form-control" value="{{ student.blood_group }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold">Community</label>
                <input type="text" name="community" class="form-control" value="{{ student.community }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label text-secondary fw-semibold">Hostel Status</label>
                <select name="hostel_status" class="form-select form-control">
                    <option value="Hosteller" {% if student.hostel_status == 'Hosteller' %}selected{% endif %}>Hosteller</option>
                    <option value="Day Scholar" {% if student.hostel_status == 'Day Scholar' %}selected{% endif %}>Day Scholar</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label text-secondary fw-semibold">Scholarship Status</label>
                <input type="text" name="scholarship_status" class="form-control" value="{{ student.scholarship_status }}" required>
            </div>
        </div>

        <h5 class="fw-bold mb-4 text-danger border-bottom pb-2"><i class="fa-solid fa-lock me-2"></i>Secure Information</h5>
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Aadhaar Number <i class="fa-solid fa-shield-halved text-success ms-1" title="Encrypted on save"></i></label>
                <!-- Usually, you don't show the raw encrypted string, but for edit we provide it placeholder or omit if we don't handle decryption here normally - wait, Aadhaar is a property we can just set again or leave alone -->
                <input type="text" name="aadhaar" class="form-control border-danger" placeholder="Leave blank to keep unchanged">
            </div>
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Student Phone <i class="fa-solid fa-shield-halved text-success ms-1"></i></label>
                <input type="text" name="student_phone" class="form-control border-danger" value="{{ student.student_phone }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Parent Phone <i class="fa-solid fa-shield-halved text-success ms-1"></i></label>
                <input type="text" name="parent_phone" class="form-control border-danger" value="{{ student.parent_phone }}" required>
            </div>
            <div class="col-md-12">
                <label class="form-label text-secondary fw-semibold">Home Address <i class="fa-solid fa-shield-halved text-success ms-1"></i></label>
                <textarea name="address" class="form-control border-danger" rows="2" required>{{ student.address }}</textarea>
            </div>
        </div>
        
        <h5 class="fw-bold mb-4 text-primary border-bottom pb-2">Account setup</h5>
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label class="form-label text-secondary fw-semibold">Reset Password (leave empty to remain unchanged)</label>
                <div class="input-group">
                    <input type="password" id="password_input" name="password" class="form-control">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                        <i class="fa-regular fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>
        </div>

        <script>
            document.getElementById('togglePassword').addEventListener('click', function () {
                const passwordInput = document.getElementById('password_input');
                const toggleIcon = document.getElementById('toggleIcon');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    toggleIcon.classList.remove('fa-eye');
                    toggleIcon.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    toggleIcon.classList.remove('fa-eye-slash');
                    toggleIcon.classList.add('fa-eye');
                }
            });
        </script>

        <div class="text-end mt-4">
            <a href="/admin/students" class="btn btn-light px-4 me-2 border">Cancel</a>
            <button type="submit" class="btn btn-gradient px-5">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
