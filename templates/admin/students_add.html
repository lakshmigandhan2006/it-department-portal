{% extends "admin/admin_base.html" %}

{% block header %}Add New Student{% endblock %}

{% block content %}
<div class="glass-card p-4">
    <form action="/admin/students/add" method="post" enctype="multipart/form-data">
        <h5 class="fw-bold mb-4 text-primary border-bottom pb-2">Academic Information</h5>
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold">Roll Number</label>
                <input type="text" name="roll_no" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold">UMIS ID</label>
                <input type="text" name="umis_id" class="form-control" required>
            </div>
            <div class="col-md-2">
                <label class="form-label text-secondary fw-semibold">Year</label>
                <select name="year" class="form-select form-control">
                    <option value="1st Year">1st Year</option>
                    <option value="2nd Year">2nd Year</option>
                    <option value="3rd Year">3rd Year</option>
                    <option value="4th Year">4th Year</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Attendance Percentage</label>
                <div class="input-group">
                    <input type="number" step="0.01" name="attendance_percentage" class="form-control" value="0.0">
                    <span class="input-group-text">%</span>
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Last Sem Percentage</label>
                <div class="input-group">
                    <input type="number" step="0.01" name="last_sem_percentage" class="form-control" value="0.0">
                    <span class="input-group-text">%</span>
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Student Photo</label>
                <input type="file" name="photo" class="form-control" accept="image/*">
            </div>
        </div>

        <h5 class="fw-bold mb-4 text-primary border-bottom pb-2">Personal Details</h5>
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold">Date of Birth</label>
                <input type="date" name="dob" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold">Gender</label>
                <select name="gender" class="form-select form-control">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold">Blood Group</label>
                <input type="text" name="blood_group" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold">Community</label>
                <input type="text" name="community" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label text-secondary fw-semibold">Hostel Status</label>
                <select name="hostel_status" class="form-select form-control">
                    <option value="Hosteller">Hosteller</option>
                    <option value="Day Scholar">Day Scholar</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label text-secondary fw-semibold">Scholarship Status</label>
                <input type="text" name="scholarship_status" class="form-control" placeholder="e.g. Approved, Pending, N/A" required>
            </div>
        </div>

        <h5 class="fw-bold mb-4 text-danger border-bottom pb-2"><i class="fa-solid fa-lock me-2"></i>Secure Information</h5>
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Aadhaar Number <i class="fa-solid fa-shield-halved text-success ms-1" title="Encrypted on save"></i></label>
                <input type="text" name="aadhaar" class="form-control border-danger" required>
            </div>
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Student Phone <i class="fa-solid fa-shield-halved text-success ms-1"></i></label>
                <input type="text" name="student_phone" class="form-control border-danger" required>
            </div>
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold">Parent Phone <i class="fa-solid fa-shield-halved text-success ms-1"></i></label>
                <input type="text" name="parent_phone" class="form-control border-danger" required>
            </div>
            <div class="col-md-12">
                <label class="form-label text-secondary fw-semibold">Home Address <i class="fa-solid fa-shield-halved text-success ms-1"></i></label>
                <textarea name="address" class="form-control border-danger" rows="2" required></textarea>
            </div>
        </div>
        
        <h5 class="fw-bold mb-4 text-primary border-bottom pb-2">Account setup</h5>
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label class="form-label text-secondary fw-semibold">Initial Default Password</label>
                <div class="input-group">
                    <input type="password" id="password_input" name="password" class="form-control" required>
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                        <i class="fa-regular fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>
        </div>

        <script>
            document.getElementById('togglePassword').addEventListener('click', function () {
                const passwordInput = document.getElementById('password_input');
                const toggleIcon = document.getElementById('toggleIcon');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    toggleIcon.classList.remove('fa-eye');
                    toggleIcon.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    toggleIcon.classList.remove('fa-eye-slash');
                    toggleIcon.classList.add('fa-eye');
                }
            });
        </script>

        <div class="text-end mt-4">
            <a href="/admin/students" class="btn btn-light px-4 me-2 border">Cancel</a>
            <button type="submit" class="btn btn-gradient px-5">Save Student Details</button>
        </div>
    </form>
</div>
{% endblock %}
