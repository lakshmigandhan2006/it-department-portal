<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - IT Dept</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="px-4 mb-4 text-center">
                {% if student.photo %}
                <img src="/{{ student.photo }}" class="rounded-circle mb-3" style="width: 80px; height: 80px; object-fit: cover; border: 3px solid var(--primary-blue);" alt="Profile">
                {% else %}
                <div class="rounded-circle bg-light d-flex align-items-center justify-content-center mx-auto mb-3" style="width: 80px; height: 80px; border: 3px solid var(--primary-blue);">
                    <i class="fa-solid fa-user fa-2x text-muted"></i>
                </div>
                {% endif %}
                <h5 class="fw-bold text-dark mb-0">{{ student.name }}</h5>
                <small class="text-muted">{{ student.roll_no }}</small>
            </div>
            
            <a href="/student/dashboard" class="{{ 'active' if request.url.path == '/student/dashboard' else '' }}">
                <i class="fa-solid fa-chart-pie me-2"></i> Dashboard
            </a>
            <a href="/student/profile" class="{{ 'active' if request.url.path == '/student/profile' else '' }}">
                <i class="fa-regular fa-id-card me-2"></i> My Profile
            </a>
            <a href="/student/syllabus" class="{{ 'active' if request.url.path == '/student/syllabus' else '' }}">
                <i class="fa-solid fa-book-open me-2"></i> Syllabus
            </a>
            <a href="/student/exams" class="{{ 'active' if request.url.path == '/student/exams' else '' }}">
                <i class="fa-solid fa-file-signature me-2"></i> Exams
            </a>
            <a href="/student/timetable" class="{{ 'active' if request.url.path == '/student/timetable' else '' }}">
                <i class="fa-solid fa-calendar-days me-2"></i> Timetable
            </a>
            <a href="/student/materials" class="{{ 'active' if request.url.path == '/student/materials' else '' }}">
                <i class="fa-solid fa-file-pdf me-2"></i> Study Materials
            </a>
            
            <div class="mt-auto p-4">
                <a href="/student-auth/logout" class="btn btn-outline-danger w-100 rounded-pill">
                    <i class="fa-solid fa-right-from-bracket me-2"></i>Logout
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content bg-light">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-dark mb-0">{% block header %}Welcome back!{% endblock %}</h2>
                <div class="d-flex align-items-center">
                    <span class="badge bg-primary rounded-pill px-3 py-2 fw-semibold"><i class="fa-solid fa-graduation-cap me-2"></i>IT Department</span>
                </div>
            </div>
            
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
