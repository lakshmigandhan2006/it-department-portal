<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - IT Dept Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="d-flex align-items-center bg-light min-vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="glass-card p-5 text-center shadow-lg">
                    <div class="mb-4">
                        <i class="fa-solid fa-graduation-cap fa-4x text-gradient"></i>
                    </div>
                    <h3 class="fw-bold mb-4">Student Login</h3>
                    {% if error %}
                    <div class="alert alert-danger py-2">{{ error }}</div>
                    {% endif %}
                    <form action="/student-auth/login" method="post" class="text-start">
                        <div class="mb-3">
                            <label class="form-label text-secondary fw-semibold small">UMIS ID</label>
                            <input type="text" name="umis_id" class="form-control" placeholder="e.g. 21IT001" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary fw-semibold small">Password</label>
                            <div class="input-group">
                                <input type="password" name="password" id="password" class="form-control border-end-0" placeholder="••••••••" required>
                                <button class="btn border border-start-0" type="button" id="togglePassword">
                                    <i class="fa-regular fa-eye text-muted"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100 btn-lg fs-6">Login <i class="fa-solid fa-arrow-right ms-2"></i></button>
                    </form>
                    <div class="mt-4 text-center">
                        <a href="/" class="text-decoration-none text-muted small"><i class="fa-solid fa-arrow-left me-1"></i> Back to Public Website</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
