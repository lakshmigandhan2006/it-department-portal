<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Faculty Panel - IT Dept Portal{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .faculty-sidebar {
            width: 260px;
            background: #fff;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            border-right: 1px solid rgba(0,0,0,0.05);
            z-index: 1000;
            overflow-y: auto;
        }
        .faculty-main {
            margin-left: 260px;
            padding: 30px;
            background: #F5F7FA;
            min-height: 100vh;
        }
        .nav-link-custom {
            padding: 12px 25px;
            color: #64748b;
            font-weight: 500;
            display: flex;
            align-items: center;
            border-left: 4px solid transparent;
            transition: all 0.2s;
            text-decoration: none;
        }
        .nav-link-custom:hover, .nav-link-custom.active {
            color: #8B0000;
            background: rgba(139, 0, 0, 0.05);
            border-left-color: #8B0000;
        }
        .nav-link-custom i {
            width: 25px;
            margin-right: 10px;
        }
        @media (max-width: 992px) {
            .faculty-sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .faculty-sidebar.show { transform: translateX(0); }
            .faculty-main { margin-left: 0; }
        }
    </style>
</head>
<body>

    <div class="faculty-sidebar" id="facultySidebar">
        <div class="p-4 border-bottom text-center">
            <img src="/static/images/crest.png" alt="." style="max-height: 50px;" class="mb-2">
            <h6 class="fw-bold text-dark mb-0">Faculty Portal</h6>
            <small class="text-muted">IT Dept Portal</small>
        </div>
        <div class="py-3">
            <a href="/faculty/dashboard" class="nav-link-custom {% if active_page == 'dashboard' %}active{% endif %}">
                <i class="fa-solid fa-gauge-high"></i> Dashboard
            </a>
            <a href="/faculty/attendance" class="nav-link-custom {% if active_page == 'attendance' %}active{% endif %}">
                <i class="fa-solid fa-clipboard-user"></i> Attendance
            </a>
            <a href="/faculty/students" class="nav-link-custom {% if active_page == 'students' %}active{% endif %}">
                <i class="fa-solid fa-user-graduate"></i> Students
            </a>
            <a href="/faculty/materials" class="nav-link-custom {% if active_page == 'materials' %}active{% endif %}">
                <i class="fa-solid fa-folder-open"></i> Materials
            </a>
            <a href="/faculty/notices" class="nav-link-custom {% if active_page == 'notices' %}active{% endif %}">
                <i class="fa-solid fa-bullhorn"></i> Notices
            </a>
            <a href="/faculty/timetable" class="nav-link-custom {% if active_page == 'timetable' %}active{% endif %}">
                <i class="fa-solid fa-calendar-days"></i> Timetable
            </a>
            <div class="border-top my-2"></div>
            <a href="/faculty-auth/logout" class="nav-link-custom text-danger">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </div>

    <div class="faculty-main">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center">
                <button class="btn btn-light d-lg-none me-3 border" onclick="document.getElementById('facultySidebar').classList.toggle('show')">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h4 class="fw-bold mb-0">{% block header %}{% endblock %}</h4>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="text-end d-none d-sm-block">
                    <div class="fw-bold small">{{ faculty.name }}</div>
                    <div class="text-muted small" style="font-size: 11px;">{{ faculty.designation }}</div>
                </div>
                {% if faculty.photo %}
                <img src="/{{ faculty.photo }}" alt="." class="rounded-circle border shadow-sm" style="width: 42px; height: 42px; object-fit: cover;">
                {% else %}
                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center border" style="width: 42px; height: 42px;">
                    <i class="fa-solid fa-user"></i>
                </div>
                {% endif %}
            </div>
        </div>

        {% block faculty_content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
