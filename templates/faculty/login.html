{% extends "base.html" %}

{% block title %}Faculty Login - IT Dept Portal{% endblock %}

{% block content %}
<section class="py-5 hero-section-bg min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px;">
                            <i class="fa-solid fa-chalkboard-user fa-2x"></i>
                        </div>
                        <h2 class="fw-bold text-dark">Faculty Login</h2>
                        <p class="text-muted small">Enter your credentials to access your dashboard</p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger border-0 rounded-4 small mb-4 py-3">
                        <i class="fa-solid fa-circle-exclamation me-2"></i> {{ error }}
                    </div>
                    {% endif %}

                    <form action="/faculty-auth/login" method="post">
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary small">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted px-3"><i class="fa-solid fa-user small"></i></span>
                                <input type="text" name="username" class="form-control border-start-0 py-2" placeholder="e.g. prof_kumar" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary small">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted px-3"><i class="fa-solid fa-lock small"></i></span>
                                <input type="password" name="password" class="form-control border-start-0 py-2" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="d-grid mb-4">
                            <button type="submit" class="btn btn-gradient py-2 fw-bold shadow-sm">
                                Login to Dashboard <i class="fa-solid fa-arrow-right ms-2"></i>
                            </button>
                        </div>
                        
                        <div class="text-center">
                            <a href="/" class="text-decoration-none small text-muted hover-lift d-inline-block">
                                <i class="fa-solid fa-house me-1"></i> Back to Homepage
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
